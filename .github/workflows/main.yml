name: 24/7 Telegram Bot

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

concurrency:
  group: telegram-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 345
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Data Persistence Loop
        run: |
          # Run the persistence loop in the background
          (
            while true; do
              sleep 900 # 15 minutes
              if [ -f spirit_accounts.json ]; then
                git config user.name "GitHub Actions"
                git config user.email "actions@github.com"
                git add spirit_accounts.json
                if ! git diff --cached --quiet; then
                  git commit -m "Auto-commit data persistence [skip ci]"
                  git push origin main
                  echo "Data persisted at $(date)"
                fi
              fi
            done
          ) &
          
          # Start the bot
          export BOT_TOKEN="${{ secrets.BOT_TOKEN }}"
          python bot.py
