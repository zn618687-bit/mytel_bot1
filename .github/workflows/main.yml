name: 24/7 Spirit Bot

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

concurrency:
  group: telegram-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 345
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Data Persistence Background Loop
        run: |
          (
            while true; do
              sleep 900
              git config --global user.name "github-actions[bot]"
              git config --global user.email "github-actions[bot]@users.noreply.github.com"
              if [[ -f spirit_bot_accounts.json ]]; then
                git add spirit_bot_accounts.json
                git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-commit: Update accounts data [skip ci]" && git push)
              fi
            done
          ) &
        shell: bash

      - name: Run Spirit Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python bot.py
